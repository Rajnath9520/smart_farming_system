version: "3.8"


services:

  influxdb:
    image: influxdb:2.7
    container_name: agrosense-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"        
    environment:
      DOCKER_INFLUXDB_INIT_MODE:        setup
      DOCKER_INFLUXDB_INIT_USERNAME:    ${INFLUX_ADMIN_USER:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD:    ${INFLUX_ADMIN_PASSWORD:-adminpassword}
      DOCKER_INFLUXDB_INIT_ORG:         ${INFLUX_ORG:-agrosense}
      DOCKER_INFLUXDB_INIT_BUCKET:      ${INFLUX_BUCKET:-sensor_data}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN:-my-super-secret-token}
      DOCKER_INFLUXDB_INIT_RETENTION:   0   
    volumes:
      - influxdb_data:/var/lib/influxdb2    
      - influxdb_config:/etc/influxdb2    
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  influxdb_data:
  influxdb_config: